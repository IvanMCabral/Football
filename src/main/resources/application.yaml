spring:
  application:
    name: football-manager
  
  # R2DBC (Reactive Database Connection)
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:football_manager}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  # Flyway (Database Migrations) - uses JDBC
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:football_manager}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  # Redis (Career Save Game Storage)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 30000ms  # Aumentado a 30s para CareerSave grande
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms
        shutdown-timeout: 100ms

  # Security
  security:
    user:
      name: admin
      password: admin

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:default-secret-key-please-change-in-production-this-should-be-at-least-512-bits-long}
  expiration: 86400000        # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# Actuator (Health checks and metrics)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    root: INFO
    com.footballmanager: DEBUG
    org.springframework.r2dbc: WARN
    org.springframework.data.r2dbc: WARN
    io.r2dbc.postgresql: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Application-specific settings
app:
  name: Football Manager
  version: 1.0.0
  description: Turn-based football team management and match simulation system
  simulation:
    league:
      use-v23-engine: false   # Phase 10C3: set to true to enable V23 league engine path
      use-v24-detailed-engine: false   # V24D5B: set to true to enable V24 detailed engine path
    v24:
      persist-detail: false   # V24D4B: store V24DetailedMatchData in Redis
      expose-detail-api: false  # V24D4C: expose GET /api/careers/{careerId}/matches/{matchId}/detail
